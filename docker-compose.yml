version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: yayasan-mmb:latest
    container_name: yayasan-mmb-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL}
    volumes:
      # Mount Firebase config file dari host ke container (read-only)
      # Pastikan file ini ada di server sebelum menjalankan docker-compose up
      - ./firebase-applet-config.json:/app/firebase-applet-config.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
