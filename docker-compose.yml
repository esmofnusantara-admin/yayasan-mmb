version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: yayasan-mmb:latest
    container_name: yayasan-mmb-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL}
    volumes:
      # Persist SQLite database file di server Biznet (data tidak hilang saat container restart)
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
